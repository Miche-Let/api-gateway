server:
  port: ${SERVER_PORT:19000}

eureka:
  client:
    enabled: ${EUREKA_ENABLED:true}
    service-url:
      defaultZone: http://${EUREKA_HOST}:${EUREKA_PORT}/eureka/
  instance:
    prefer-ip-address: true

spring:
  cloud:
    inetutils:
      ignored-interfaces:
        - "lo"
        - "docker.*"
        - "veth.*"
      preferred-networks:
        - "10.0"
      use-only-site-local-interfaces: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
